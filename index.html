<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSÃO: ANIVERSÁRIO - GTA V</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: white;
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- SEÇÃO 1: CAPA --- */
        .section-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Use a imagem 1000086315.jpg como fundo aqui */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('1000086315.jpg') no-repeat center center;
            background-size: cover;
            text-align: center;
        }

        .logo-gta {
            font-size: 4rem;
            text-transform: uppercase;
            filter: drop-shadow(4px 4px 0px #000);
        }

        .logo-gta span { color: #5cb85c; }

        /* --- SIDNEY ALEATÓRIO --- */
        #sidney {
            position: fixed;
            width: 150px;
            z-index: 100;
            display: none;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.8));
            pointer-events: none;
        }

        /* --- SEÇÃO 2: O SQUAD --- */
        .section-squad {
            min-height: 100vh;
            padding: 50px 20px;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 5px solid #5cb85c;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .char-card {
            background: #000;
            border: 2px solid #333;
            padding: 15px;
            width: 280px;
            text-align: center;
            transition: 0.3s;
        }

        .char-card:hover { border-color: #5cb85c; }

        .char-card img { width: 100%; height: auto; border-radius: 4px; }

        /* --- SEÇÃO 3: CONFIRMAÇÃO --- */
        .section-rsvp {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('1000086315.jpg') no-repeat center center;
            background-size: cover;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #5cb85c;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .btn {
            display: block;
            padding: 18px;
            margin: 15px 0;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border-radius: 4px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .rsvp { background-color: #25D366; }
        .maps { background-color: #4285F4; }
        .btn:hover { transform: scale(1.05); }

        .scroll-hint { color: #f1c40f; margin-top: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
    </style>
</head>
<body>

    <img src="1000086309.png" id="sidney" alt="Sidney">

    <section class="section-hero">
        <h1 class="logo-gta">Grand <span>Theft</span> Luana</h1>
        <p class="scroll-hint">▼ ROLE PARA BAIXO PARA A MISSÃO ▼</p>
    </section>

    <section class="section-squad">
        <h2 style="font-size: 2.5rem; color: #5cb85c;">APRESENTANDO O SQUAD</h2>
        <div class="gallery">
            <div class="char-card">
                <img src="1000086319.png" alt="Operador Hazmat">
                <p>OPERADOR HAZMAT</p>
            </div>
            <div class="char-card">
                <img src="1000086309.png" alt="CJ Lambo">
                <p>CJ NO LAMBO</p>
            </div>
            <div class="char-card">
                <img src="1000086308.png" alt="CJ Bike">
                <p>CJ NA BIKE</p>
            </div>
        </div>
    </section>

    <section class="section-rsvp">
        <div class="info-box">
            <h2 style="color: #5cb85c; font-size: 2.2rem; margin-bottom: 20px;">DETALHES DA MISSÃO</h2>
            <div style="text-align: left; margin-bottom: 20px; line-height: 1.6;">
                <p>📍 <strong>LOCAL:</strong> ARENA AIRSOFT (SEU ENDEREÇO)</p>
                <p>📅 <strong>DATA:</strong> [DEFINIR DATA]</p>
                <p>⏰ <strong>HORÁRIO:</strong> [DEFINIR HORA]</p>
            </div>

            <a href="https://wa.me/5585999999999?text=Missão%20Confirmada!" class="btn rsvp">CONFIRMAR PRESENÇA</a>
            <a href="https://maps.google.com" target="_blank" class="btn maps">VER LOCALIZAÇÃO</a>
        </div>
    </section>

    <script>
        const sidney = document.getElementById('sidney');
        
        // Array com as tuas imagens do Sidney para variar
        const imagensSidney = ['1000086309.png', '1000086308.png'];

        function aparecerSidney() {
            // Muda a imagem aleatoriamente entre as duas do CJ
            sidney.src = imagensSidney[Math.floor(Math.random() * imagensSidney.length)];

            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 150);

            sidney.style.left = x + 'px';
            sidney.style.top = y + 'px';
            sidney.style.display = 'block';

            setTimeout(() => {
                sidney.style.display = 'none';
            }, 1500); // Fica 1.5 segundos na tela
        }

        // Aparece a cada 4 segundos
        setInterval(aparecerSidney, 4000);
    </script>
</body>
</html>
