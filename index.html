<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSÃO: ANIVERSÁRIO - GTA V</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: white;
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Seção 1: Capa com fundo oficial do GTA V */
        .section-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Imagem de fundo oficial do GTA V */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://wallpaperaccess.com/full/1155029.jpg') no-repeat center center;
            background-size: cover;
            text-align: center;
        }

        .logo-gta {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            text-transform: uppercase;
            filter: drop-shadow(5px 5px 0px #000);
            line-height: 1;
        }

        .logo-gta span { color: #5cb85c; }

        /* Estilo do Sidney (Oculto por padrão) */
        #sidney {
            position: fixed;
            width: 180px;
            z-index: 100;
            display: none; /* Começa escondido */
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.8));
            pointer-events: none; /* Não atrapalha o clique */
        }

        /* Seção 2: Personagens */
        .section-characters {
            min-height: 100vh;
            padding: 80px 20px;
            background: linear-gradient(#1a1a1a, #000);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 5px solid #5cb85c;
        }

        .char-card {
            background: #000;
            border: 2px solid #5cb85c;
            margin: 20px;
            padding: 15px;
            max-width: 300px;
            text-align: center;
        }

        .char-card img { width: 100%; height: auto; }

        /* Seção 3: Confirmação */
        .section-rsvp {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://wallpapers.com/images/featured/gta-5-background-9v1pxz1v1u5p1w6k.jpg') no-repeat center center;
            background-size: cover;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #5cb85c;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .btn {
            display: block;
            padding: 18px;
            margin: 15px 0;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border-radius: 4px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .rsvp { background-color: #25D366; }
        .maps { background-color: #4285F4; }
        .btn:hover { transform: scale(1.05); }

        .scroll-hint {
            margin-top: 20px;
            color: #f1c40f;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
        }
    </style>
</head>
<body>

    <img src="https://www.pngplay.com/wp-content/uploads/12/Grand-Theft-Auto-San-Andreas-CJ-PNG-Images-HD.png" id="sidney" alt="Sidney">

    <section class="section-hero">
        <h1 class="logo-gta">Grand <span>Theft</span> Luana</h1>
        <p class="scroll-hint">▼ ROLE PARA BAIXO ▼</p>
    </section>

    <section class="section-characters">
        <h2 style="font-size: 2.5rem; color: #5cb85c;">EQUIPE AIRSOFT</h2>
        <div class="char-card">
            <img src="https://www.pngplay.com/wp-content/uploads/12/Grand-Theft-Auto-V-Trevor-Philips-PNG-Clipart-Background.png" alt="Trevor">
            <p>OPERADOR: TREVOR</p>
        </div>
        <p>Continue rolando para confirmar...</p>
    </section>

    <section class="section-rsvp">
        <div class="info-box">
            <h2 style="color: #5cb85c; font-size: 2.2rem; margin-bottom: 20px;">MISSÃO: ANIVERSÁRIO</h2>
            <p>LOCAL: ARENA AIRSOFT</p>
            <p>DATA: 25/04/2026 às 19:00h</p>

            <a href="https://wa.me/5585999999999?text=Missão%20Confirmada!" class="btn rsvp">CONFIRMAR NO WHATSAPP</a>
            <a href="https://maps.google.com" target="_blank" class="btn maps">VER LOCALIZAÇÃO</a>
        </div>
    </section>

    <script>
        const sidney = document.getElementById('sidney');

        function moverSidney() {
            // Gera posições aleatórias baseadas no tamanho da tela
            const x = Math.random() * (window.innerWidth - 180);
            const y = Math.random() * (window.innerHeight - 200);

            sidney.style.left = x + 'px';
            sidney.style.top = y + 'px';
            sidney.style.display = 'block';

            // Faz ele sumir depois de 2 segundos
            setTimeout(() => {
                sidney.style.display = 'none';
            }, 2000);
        }

        // Chama a função a cada 5 segundos
        setInterval(moverSidney, 5000);

        // Também aparece logo que o site carrega pela primeira vez
        window.onload = moverSidney;
    </script>

</body>
</html>
