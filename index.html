<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSÃO: ANIVERSÁRIO - GTA V</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: white;
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Seção 1: Capa / Loading Screen */
        .section-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.alphacoders.com/439/439539.jpg') no-repeat center center;
            background-size: cover;
            text-align: center;
        }

        .logo-gta {
            font-size: 4rem;
            text-transform: uppercase;
            filter: drop-shadow(4px 4px 0px #000);
            animation: pulse 2s infinite;
        }

        .logo-gta span { color: #5cb85c; }

        .scroll-indicator {
            position: absolute;
            bottom: 20px;
            font-size: 1.2rem;
            color: #f1c40f;
            animation: bounce 2s infinite;
        }

        /* Seção 2: Personagens e Airsoft */
        .section-characters {
            min-height: 100vh;
            padding: 50px 20px;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 5px solid #5cb85c;
            border-bottom: 5px solid #5cb85c;
        }

        .airsoft-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .char-card {
            width: 250px;
            text-align: center;
            background: #000;
            padding: 10px;
            border: 2px solid #333;
        }

        .char-card img { width: 100%; border-radius: 4px; }

        /* Animação do Sidney */
        .sidney-container {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            margin-top: 40px;
        }

        .sidney-walk {
            width: 150px;
            position: absolute;
            left: -150px;
            animation: sidneyMove 10s linear infinite;
        }

        @keyframes sidneyMove {
            from { left: -150px; }
            to { left: 110%; }
        }

        /* Seção 3: Confirmação (Final da Roda) */
        .section-rsvp {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .info-box {
            background: rgba(20, 20, 20, 0.9);
            border: 3px solid #5cb85c;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(92, 184, 92, 0.3);
        }

        .btn {
            display: block;
            padding: 18px;
            margin: 15px 0;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .rsvp { background-color: #25D366; }
        .maps { background-color: #4285F4; }

        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Animações */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <section class="section-hero">
        <h1 class="logo-gta">Grand <span>Theft</span> Luana</h1>
        <h2 style="color: #f1c40f;">LOADED: 100%</h2>
        <div class="scroll-indicator">▼ ROLE PARA INICIAR A MISSÃO ▼</div>
    </section>

    <section class="section-characters">
        <h2 style="font-size: 2.5rem;">SQUAD AIRSOFT</h2>
        <div class="airsoft-gallery">
            <div class="char-card">
                <img src="https://www.pngplay.com/wp-content/uploads/12/Grand-Theft-Auto-V-Michael-De-Santa-PNG-Photos.png" alt="Michael Airsoft">
                <p>MICHAEL: SNIPER</p>
            </div>
            <div class="char-card">
                <img src="https://www.pngplay.com/wp-content/uploads/12/Grand-Theft-Auto-V-Franklin-Clinton-PNG-Images-HD.png" alt="Franklin Airsoft">
                <p>FRANKLIN: ASSAULT</p>
            </div>
        </div>

        <div class="sidney-container">
            <img src="https://www.pngplay.com/wp-content/uploads/12/Grand-Theft-Auto-San-Andreas-CJ-PNG-Images-HD.png" class="sidney-walk" alt="Sidney Walking">
        </div>
        <p style="color: #888; margin-top: 10px;">"QUASE LÁ... CONTINUE ROLANDO"</p>
    </section>

    <section class="section-rsvp">
        <div class="info-box">
            <h2 style="color: #5cb85c; font-size: 2.5rem; margin-bottom: 20px;">MISSÃO FINAL</h2>
            <div style="font-size: 1.3rem; margin-bottom: 30px; text-align: left;">
                <p>📍 <strong>LOCAL:</strong> ARENA AIRSOFT CENTRAL</p>
                <p>📅 <strong>DATA:</strong> 25/04/2026</p>
                <p>⏰ <strong>HORÁRIO:</strong> 19:00h</p>
            </div>

            <a href="https://wa.me/5585999999999?text=Missão%20Confirmada!%20Operador%20se%20apresentando." class="btn rsvp">
                CONFIRMAR PRESENÇA
            </a>
            
            <a href="https://maps.google.com" target="_blank" class="btn maps">
                VER COORDENADAS (MAPS)
            </a>
        </div>
    </section>

</body>
</html>
